<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A5F"/>
      <stop offset="100%" style="stop-color:#0F172A"/>
    </linearGradient>
    <linearGradient id="clip" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#34D399"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="paper" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8FAFC"/>
      <stop offset="100%" style="stop-color:#E2E8F0"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Subtle inner glow -->
  <rect x="4" y="4" width="504" height="504" rx="104" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>
  <!-- Clipboard body -->
  <rect x="148" y="140" width="216" height="272" rx="16" fill="url(#paper)" opacity="0.95"/>
  <!-- Clipboard clip top -->
  <rect x="200" y="116" width="112" height="48" rx="24" fill="url(#clip)"/>
  <!-- Clip inner hole -->
  <rect x="228" y="128" width="56" height="24" rx="12" fill="url(#bg)"/>
  <!-- Text lines on clipboard -->
  <rect x="180" y="196" width="152" height="10" rx="5" fill="#94A3B8"/>
  <rect x="180" y="224" width="120" height="10" rx="5" fill="#CBD5E1"/>
  <rect x="180" y="252" width="140" height="10" rx="5" fill="#CBD5E1"/>
  <rect x="180" y="280" width="96" height="10" rx="5" fill="#CBD5E1"/>
  <!-- AI sparkle accent -->
  <circle cx="340" cy="340" r="48" fill="url(#clip)" opacity="0.9"/>
  <path d="M340 312 L344 332 L364 336 L344 340 L340 360 L336 340 L316 336 L336 332 Z" fill="white"/>
  <!-- Small sparkle -->
  <circle cx="172" cy="360" r="6" fill="#059669" opacity="0.6"/>
  <circle cx="360" cy="160" r="4" fill="#34D399" opacity="0.4"/>
</svg>
