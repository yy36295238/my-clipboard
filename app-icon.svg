<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- 深空底色 -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1428"/>
      <stop offset="55%" stop-color="#0A0F1E"/>
      <stop offset="100%" stop-color="#131A38"/>
    </linearGradient>
    <!-- 顶部环境光 -->
    <radialGradient id="ambient" cx="30%" cy="0%" r="90%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.16"/>
      <stop offset="45%" stop-color="#38BDF8" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <!-- 霓虹主渐变：青 → 紫 -->
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="55%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <!-- 星芒渐变 -->
    <linearGradient id="spark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0FDFF"/>
      <stop offset="60%" stop-color="#7DD3FC"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- 底板 -->
  <rect width="512" height="512" rx="115" fill="url(#bg)"/>
  <rect width="512" height="512" rx="115" fill="url(#ambient)"/>
  <rect x="3" y="3" width="506" height="506" rx="112" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="2"/>

  <!-- 剪贴板霓虹辉光（模糊副本） -->
  <g filter="url(#softGlow)" opacity="0.55">
    <rect x="160" y="138" width="192" height="256" rx="30" fill="none" stroke="url(#neon)" stroke-width="18"/>
    <rect x="212" y="112" width="88" height="48" rx="24" fill="url(#neon)"/>
  </g>

  <!-- 剪贴板主体：极简描边轮廓 -->
  <rect x="160" y="138" width="192" height="256" rx="30" fill="rgba(255,255,255,0.03)" stroke="url(#neon)" stroke-width="18"/>
  <!-- 顶部夹子：实心渐变胶囊 -->
  <rect x="212" y="112" width="88" height="48" rx="24" fill="url(#neon)"/>

  <!-- 内容线条 -->
  <rect x="200" y="212" width="112" height="14" rx="7" fill="#E2E8F0" opacity="0.85"/>
  <rect x="200" y="250" width="76" height="14" rx="7" fill="#94A3B8" opacity="0.55"/>

  <!-- 星芒底部的暗色挖空，让星芒从轮廓上浮起 -->
  <circle cx="352" cy="338" r="68" fill="url(#bg)"/>

  <!-- AI 星芒（带辉光） -->
  <path d="M352 270 C358 312 378 332 420 338 C378 344 358 364 352 406 C346 364 326 344 284 338 C326 332 346 312 352 270 Z"
        fill="#22D3EE" opacity="0.8" filter="url(#glow)"/>
  <path d="M352 274 C358 314 377 333 417 338 C377 343 358 362 352 402 C346 362 327 343 287 338 C327 333 346 314 352 274 Z"
        fill="url(#spark)"/>
  <!-- 小星点点缀 -->
  <path d="M404 256 C406 268 412 274 424 276 C412 278 406 284 404 296 C402 284 396 278 384 276 C396 274 402 268 404 256 Z"
        fill="#7DD3FC" opacity="0.7"/>
</svg>
